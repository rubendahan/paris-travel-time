name: Keep Render awake

# Render's free tier puts the API to sleep after 15 idle minutes; the first
# visitor then waits ~1 min. A ping every 10 minutes keeps it warm during
# the day (no need at night). GitHub pauses schedules after 60 days without
# repo activity; a commit revives them.

on:
  schedule:
    - cron: '*/10 6-23 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: curl -sf --max-time 90 https://paris-travel-time-api.onrender.com/health
